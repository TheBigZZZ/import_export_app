name: Build and Publish Installer

on:
  workflow_run:
    workflows: ["Semantic Release"]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve release tag
        id: release_meta
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if (-not $tag) {
            $headers = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              "X-GitHub-Api-Version" = "2022-11-28"
              "User-Agent" = "copilot"
            }
            $repo = "${{ github.repository }}"
            $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/latest"
            $tag = $release.tag_name
          }

          if (-not $tag) {
            throw "Unable to determine release tag"
          }

          "tag_name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Use the packaging pinned requirements to ensure build-time deps are stable
          pip install -r packaging/requirements-pinned.txt
          pip install pyinstaller==6.20.0

      - name: Build frontend executable (PyInstaller)
        run: |
          python -m PyInstaller --clean --noconfirm packaging/tradedesk.spec

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress
          if (Get-Command refreshenv -ErrorAction SilentlyContinue) { refreshenv }

      - name: Build installer (Inno Setup)
        shell: powershell
        run: |
          $isccCandidates = @(
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          ) | Where-Object { $_ -and (Test-Path $_) }

          $iscc = $isccCandidates | Select-Object -First 1
          if (-not $iscc) {
            Write-Host "ISCC.exe not found after choco install" -ForegroundColor Red
            Get-ChildItem -Path 'C:\Program Files*\Inno Setup 6' -Recurse -Filter ISCC.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            exit 1
          }

          & $iscc "packaging\TradeDeskERP.iss"

      - name: Generate SBOM
        run: |
          python packaging/generate_sbom.py --output sbom.json

      - name: Create manifest for updater (with checksum)
        shell: powershell
        run: |
          $tag = "${{ steps.release_meta.outputs.tag_name }}"
          $installerName = "TradeDeskERP-Setup.exe"
          $installerPath = "dist\$installerName"
          $hash = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLower()
          $manifest = @{
            version = $tag
            installer_url = "https://github.com/${{ github.repository }}/releases/download/$tag/$installerName"
            installer_sha256 = $hash
            published_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          }
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path updates.json -Encoding UTF8

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          files: |
            dist/TradeDeskERP/TradeDeskERP.exe
            dist/TradeDeskERP-Setup.exe
            sbom.json
            updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
