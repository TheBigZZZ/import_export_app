name: Build and Publish Installer

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Build frontend executable (PyInstaller)
        run: |
          python -m PyInstaller --clean --noconfirm packaging/tradedesk.spec

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "packaging\TradeDeskERP.iss"

      - name: Generate SBOM
        run: |
          python packaging/generate_sbom.py --output sbom.json

      - name: Create manifest for updater (with checksum)
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $installerName = "TradeDeskERP-Setup.exe"
          $installerPath = "dist\$installerName"
          $hash = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLower()
          $manifest = @{
            version = $tag
            installer_url = "https://github.com/${{ github.repository }}/releases/download/$tag/$installerName"
            installer_sha256 = $hash
            published_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          }
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path updates.json -Encoding UTF8

      - name: Create GitHub Release (from trigger)
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: "Automated release artifacts"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/TradeDeskERP/TradeDeskERP.exe
          asset_name: TradeDeskERP.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/TradeDeskERP-Setup.exe
          asset_name: TradeDeskERP-Setup.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: sbom.json
          asset_name: sbom.json
          asset_content_type: application/json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload updates manifest to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: updates.json
          asset_name: updates.json
          asset_content_type: application/json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
