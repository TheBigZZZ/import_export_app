name: Auto Tag and Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next tag (patch bump)
        id: tag
        run: |
          set -e
          # get latest tag, default to v0.0.0
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"
          # strip leading v if present
          V=${LATEST#v}
          IFS='.' read -r MAJ MIN PATCH <<< "$V"
          if [ -z "$MAJ" ]; then MAJ=0; fi
          if [ -z "$MIN" ]; then MIN=0; fi
          if [ -z "$PATCH" ]; then PATCH=0; fi
          NEWPATCH=$((PATCH + 1))
          NEW_TAG="v${MAJ}.${MIN}.${NEWPATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create annotated tag
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          set -e
          echo "Creating tag $NEW_TAG"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Automated release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          release_name: ${{ steps.tag.outputs.new_tag }}
          body: "Automated release ${{ steps.tag.outputs.new_tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
