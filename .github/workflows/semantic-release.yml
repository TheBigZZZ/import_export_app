name: Semantic Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_tag.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install semantic-release and plugins
        run: |
          # Ensure npm metadata exists (no-op if package.json already present)
          node -e "process.exit(0)"
          # Use legacy-peer-deps to avoid ERESOLVE failures in CI when plugin peer ranges don't align.
          npm install --no-audit --no-fund --legacy-peer-deps semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog @semantic-release/git @semantic-release/github

      - name: Run semantic-release
        id: semantic
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use npx to run semantic-release without committing to package.json
          npx -y semantic-release@19

      - name: Detect whether HEAD was tagged
        id: detect_release
        shell: bash
        run: |
          git fetch --tags --force
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [ -n "$TAG" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Fallback: create patch tag & release if semantic-release didn't publish"
        id: fallback_release
        if: ${{ steps.semantic.outcome != 'success' || steps.detect_release.outputs.published != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ensure NEW_TAG exists in environment for subsequent steps
          echo "NEW_TAG=" >> $GITHUB_ENV
          set -e
          echo "Semantic-release did not publish; creating a patch tag and release"
          # ensure git history
          git fetch --unshallow || true
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"
          V=${LATEST#v}
          IFS='.' read -r MAJ MIN PATCH <<< "$V"
          if [ -z "$MAJ" ]; then MAJ=0; fi
          if [ -z "$MIN" ]; then MIN=0; fi
          if [ -z "$PATCH" ]; then PATCH=0; fi
          NEWPATCH=$((PATCH + 1))
          NEW_TAG="v${MAJ}.${MIN}.${NEWPATCH}"
          echo "Creating tag $NEW_TAG"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Automated fallback release $NEW_TAG"
          git push origin "$NEW_TAG"
          # create a GitHub release for the tag using the API
          echo "Creating GitHub release for $NEW_TAG"
          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/releases \
            -d "{\"tag_name\": \"$NEW_TAG\", \"name\": \"$NEW_TAG\", \"body\": \"Automated fallback release\"}"
          echo "tag_name=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag output
        id: release_tag
        shell: bash
        run: |
          TAG="${{ steps.detect_release.outputs.tag_name || steps.fallback_release.outputs.tag_name }}"
          if [ -z "$TAG" ]; then
            echo "No release tag was produced" >&2
            exit 1
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

  build-and-upload-assets:
    needs: release
    runs-on: windows-latest
    if: ${{ always() && needs.release.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ needs.release.outputs.tag_name }}"
          if (-not $tag) {
            throw "Unable to determine release tag from release job"
          }

          "tag_name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging/requirements-pinned.txt
          pip install cyclonedx-bom
          pip install pyinstaller==6.20.0

      - name: Build frontend executable (PyInstaller)
        run: |
          python -m PyInstaller --clean --noconfirm packaging/tradedesk.spec

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress
          if (Get-Command refreshenv -ErrorAction SilentlyContinue) { refreshenv }

      - name: Build installer (Inno Setup)
        shell: powershell
        run: |
          $isccCandidates = @(
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          ) | Where-Object { $_ -and (Test-Path $_) }

          $iscc = $isccCandidates | Select-Object -First 1
          if (-not $iscc) {
            Write-Host "ISCC.exe not found after choco install" -ForegroundColor Red
            Get-ChildItem -Path 'C:\Program Files*\Inno Setup 6' -Recurse -Filter ISCC.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            exit 1
          }

          & $iscc "packaging\TradeDeskERP.iss"

      - name: Generate SBOM
        run: |
          python packaging/generate_sbom.py --output sbom.json

      - name: Create manifest for updater (with checksum)
        shell: powershell
        run: |
          $tag = "${{ steps.release_meta.outputs.tag_name }}"
          $installerName = "TradeDeskERP-Setup.exe"
          $installerPath = "dist\$installerName"
          $hash = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLower()
          $manifest = @{
            version = $tag
            installer_url = "https://github.com/${{ github.repository }}/releases/download/$tag/$installerName"
            installer_sha256 = $hash
            published_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          }
          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path updates.json -Encoding UTF8

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          files: |
            dist/TradeDeskERP/TradeDeskERP.exe
            dist/TradeDeskERP-Setup.exe
            sbom.json
            updates.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
