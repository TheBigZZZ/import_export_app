name: Build and publish Windows EXE

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
        shell: pwsh

      - name: Build EXE (PyInstaller)
        run: |
          .\packaging\build_exe.ps1
        shell: pwsh

      - name: Smoke-test the EXE (health endpoint)
        shell: pwsh
        run: |
          $exe = "dist\launcher.exe"
          if (-not (Test-Path $exe)) { Write-Host "EXE not found: $exe"; exit 1 }
          Write-Host "Starting EXE for smoke test..."
          $proc = Start-Process -FilePath $exe -PassThru
          $healthUrl = "http://127.0.0.1:8742/health"
          $max = 30
          $ok = $false
          for ($i=0; $i -lt $max; $i++) {
            try {
              $r = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
            Start-Sleep -Seconds 1
          }
          if (-not $ok) {
            Write-Host "Health check failed after waiting" -ForegroundColor Red
            if ($proc -and $proc.Id) { Stop-Process -Id $proc.Id -ErrorAction SilentlyContinue }
            exit 1
          }
          Write-Host "Health check OK. Stopping process..."
          Stop-Process -Id $proc.Id -ErrorAction SilentlyContinue

      - name: Build NSIS installer
        shell: pwsh
        run: |
          Write-Host "Installing NSIS via choco (if not present)"
          choco install nsis -y --no-progress
          $nsis = Get-Command makensis -ErrorAction SilentlyContinue
          if (-not $nsis) { Write-Host "makensis not found after choco install"; exit 1 }
          Write-Host "Running makensis to create installer"
          makensis packaging\installer\tradedesk_installer.nsi

      - name: Upload build artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: tradedesk-exe
          path: |
            dist/launcher.exe
            dist\TradeDesk-Setup.exe

      - name: Create Release and upload EXE + installer
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          files: |
            dist/launcher.exe
            dist\TradeDesk-Setup.exe
