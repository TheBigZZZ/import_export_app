name: Backend E2E Smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-e2e:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f packaging/requirements-pinned.txt ]; then pip install -r packaging/requirements-pinned.txt; else pip install -r requirements.txt; fi
      - name: Install repo package
        run: |
          python -m pip install --force-reinstall --no-deps .
      - name: Run unit tests
        run: python -m pytest -q
      - name: Run CI smoke test
        run: python scripts/ci_smoke_test.py
