name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r packaging/requirements-pinned.txt
      - name: Inspect workspace layout
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Listing top-level files:"; ls -la
          echo "Searching for 'tradedesk' package directory..."
          find . -maxdepth 4 -type d -name tradedesk -print || true
      - name: Locate package root
        id: locate_install
        run: |
          pkg_dir=$(find . -maxdepth 4 -type d -name tradedesk -print | head -n1) || true
          if [ -z "$pkg_dir" ]; then
            echo "No tradedesk package found via find; defaulting to current dir"
            pkg_dir=.
          fi
          # package dir should be the parent directory that contains tradedesk
          pkg_root=$(dirname "$pkg_dir")
          echo "PACKAGE_DIR=$pkg_root" >> $GITHUB_ENV
          echo "Found package root: $pkg_root"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist "$PACKAGE_DIR"

      - name: Install wheel and verify
        run: |
          python -m pip uninstall -y tradedesk || true
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python -m pip show tradedesk
          python -c "import tradedesk; print('tradedesk imported from', tradedesk.__file__)"

      - name: Run tests
        run: |
          python -m pytest -q

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: migrations
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install cyclonedx-bom
        run: python -m pip install cyclonedx-bom
      - name: Generate SBOM from pinned requirements
        run: python packaging/generate_sbom.py
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: packaging/sbom.xml

  vuln-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    needs: generate-sbom
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install Safety
        run: python -m pip install safety
      - name: Run Safety vulnerability check
        run: |
          # Normalize requirements file encoding to UTF-8 (some files may be UTF-16)
          python packaging/normalize_requirements.py
          # Run safety and save full report to a file (don't fail the job on findings)
          safety check --file=packaging/requirements-pinned.txt --full-report > packaging/safety-report.txt || true
          # Print a short preview into the logs for quick inspection
          echo "--- safety report (head) ---"
          head -n 200 packaging/safety-report.txt || true
          echo "--- end safety preview ---"
      - name: Upload safety report
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: packaging/safety-report.txt

  migrations:
    name: Apply DB migrations (CI)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install migration deps
        run: |
          python -m pip install --upgrade pip
          # Install the pinned runtime deps so migrations can import project modules
          python -m pip install -r packaging/requirements-pinned.txt
      - name: Ensure DB backup and run migrations
        run: |
          echo "Preparing database for migrations"
          # default path matches Settings.db_path used in tests/local runs
          export DBPATH=${{ github.workspace }}/data/tradedesk.db || true
          mkdir -p $(dirname "$DBPATH") || true
          if [ -f "$DBPATH" ]; then
            cp "$DBPATH" "$DBPATH".bak || true
            echo "Existing DB backed up"
          fi
          python -m tradedesk.backend.cli --init-db || (echo "Migrations failed" >&2; exit 1)

  build-windows-exe:
    name: Build Windows EXE (optional)
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.16.0
      - name: Build EXE with PyInstaller
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1
      - name: Show dist contents and set EXE_PATH
        if: always()
        shell: powershell
        run: |
          Write-Host "Listing dist folder contents:";
          if (Test-Path .\dist) { Get-ChildItem -Path .\dist -Recurse | Select-Object FullName,Length | Format-Table -AutoSize } else { Write-Host 'dist folder not present' }
          $exe = Get-ChildItem -Path .\dist -Recurse -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) { Write-Host "Found exe: $($exe.FullName)"; "EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append } else { Write-Host 'No exe found in dist' }
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeDeskERP-dist
          path: dist/**
      - name: Run Windows smoke test
        if: always()
        shell: powershell
        run: |
          if (-not $env:EXE_PATH) { Write-Host 'EXE_PATH not set; will attempt to locate exe inside dist'; }
          powershell -ExecutionPolicy Bypass -File .\scripts\smoke_test.ps1 -ExePath "$env:EXE_PATH" -HealthUrl http://127.0.0.1:8742/health -Timeout 120
      - name: Collect Windows smoke artifacts
        if: always()
        shell: powershell
        run: |
          $out = Join-Path (Get-Location) 'logs\smoke_artifact'
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          # copy dist outputs
          if (Test-Path .\dist) { Copy-Item -Path .\dist -Destination $out -Recurse -Force -ErrorAction SilentlyContinue }
          # copy any CI temp backend error file
          $err = Join-Path $env:TEMP 'tradedesk-backend-error.txt'
          if (Test-Path $err) { Copy-Item -Path $err -Destination $out -Force }
          # copy user TradeDesk logs if present
          $userTD = Join-Path $env:USERPROFILE 'TradeDesk'
          if (Test-Path $userTD) { Copy-Item -Path (Join-Path $userTD 'logs') -Destination $out -Recurse -Force -ErrorAction SilentlyContinue }
          # touch a manifest for quick browsing
          Get-ChildItem -Path $out -Recurse | Select-Object FullName,Length | Format-Table | Out-String | Set-Content -Path (Join-Path $out 'manifest.txt')
      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-artifacts
          path: logs/smoke_artifact/**
