name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run flake8
        run: |
          python -m pip install flake8
          python -m flake8 --max-line-length=120
      - name: Run tests
        run: |
          python -m pip install pytest pytest-asyncio httpx
          python -m pytest -q

  build-and-smoke-windows:
    runs-on: windows-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build EXE
        shell: pwsh
        run: ./scripts/build_windows.ps1
      - name: Smoke test EXE
        shell: pwsh
        env:
          TRADEDESK_HEADLESS_SMOKE: "1"
        run: |
          $exe = "dist\TradeDeskERP\TradeDeskERP.exe"
          if (-not (Test-Path $exe)) { throw "EXE not found: $exe" }
          ./scripts/smoke_test.ps1 -ExePath $exe -Timeout 180

  build-windows:
    runs-on: windows-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build onefile EXE
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name tradedesk_prod scripts/pyinstaller_smoke.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tradedesk-prod-exe
          path: dist\tradedesk_prod.exe
