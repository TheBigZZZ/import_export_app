name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r packaging/requirements-pinned.txt
      - name: Inspect workspace layout
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Listing top-level files:"; ls -la
          echo "Searching for 'tradedesk' package directory..."
          find . -maxdepth 4 -type d -name tradedesk -print || true
      - name: Locate package root
        id: locate_install
        run: |
          pkg_dir=$(find . -maxdepth 4 -type d -name tradedesk -print | head -n1) || true
          if [ -z "$pkg_dir" ]; then
            echo "No tradedesk package found via find; defaulting to current dir"
            pkg_dir=.
          fi
          # package dir should be the parent directory that contains tradedesk
          pkg_root=$(dirname "$pkg_dir")
          echo "PACKAGE_DIR=$pkg_root" >> $GITHUB_ENV
          echo "Found package root: $pkg_root"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist "$PACKAGE_DIR"

      - name: Install wheel and verify
        run: |
          python -m pip uninstall -y tradedesk || true
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python -m pip show tradedesk
          python -c "import tradedesk; print('tradedesk imported from', tradedesk.__file__)"

      - name: Run tests
        run: |
          python -m pytest -q

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: migrations
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install cyclonedx-bom
        run: python -m pip install cyclonedx-bom
      - name: Generate SBOM from pinned requirements
        run: python packaging/generate_sbom.py
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: packaging/sbom.xml

  vuln-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    needs: generate-sbom
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install Safety
        run: python -m pip install safety
      - name: Run Safety vulnerability check
        run: |
          safety check --file=packaging/requirements-pinned.txt --full-report --severity=high

  migrations:
    name: Apply DB migrations (CI)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install migration deps
        run: python -m pip install alembic
      - name: Ensure DB backup and run migrations
        run: |
          echo "Preparing database for migrations"
          # default path matches Settings.db_path used in tests/local runs
          export DBPATH=${{ github.workspace }}/data/tradedesk.db || true
          mkdir -p $(dirname "$DBPATH") || true
          if [ -f "$DBPATH" ]; then
            cp "$DBPATH" "$DBPATH".bak || true
            echo "Existing DB backed up"
          fi
          python -m tradedesk.backend.cli --init-db || (echo "Migrations failed" >&2; exit 1)

  build-windows-exe:
    name: Build Windows EXE (optional)
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.16.0
      - name: Build EXE with PyInstaller
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeDeskERP-dist
          path: dist/TradeDeskERP/**
      - name: Run Windows smoke test
        if: always()
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\smoke_test.ps1 -ExePath .\dist\TradeDeskERP\TradeDeskERP.exe -HealthUrl http://127.0.0.1:8742/health -Timeout 60
      - name: Upload smoke test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-log
          path: .\logs\smoke_test.log
