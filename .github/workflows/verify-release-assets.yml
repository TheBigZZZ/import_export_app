name: Verify Release Assets

on:
  release:
    types: [published]
  workflow_run:
    workflows:
      - "Semantic Release"
      - "Build and Publish Installer"
      - "Build and publish Windows EXE"
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check-assets:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Resolve release tag
        id: release_meta
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const eventName = context.eventName;
            if (eventName === 'release') {
              core.setOutput('tag', context.payload.release.tag_name);
              core.setOutput('releaseId', String(context.payload.release.id));
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const latest = await github.rest.repos.getLatestRelease({ owner, repo });
            core.setOutput('tag', latest.data.tag_name);
            core.setOutput('releaseId', String(latest.data.id));

      - name: Verify release assets
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseId = Number('${{ steps.release_meta.outputs.releaseId }}');
            const tag = '${{ steps.release_meta.outputs.tag }}';

            const assets = await github.rest.repos.listReleaseAssets({ owner, repo, release_id: releaseId });
            const names = assets.data.map(a => a.name);

            const expected = [
              'TradeDeskERP.exe',
              'TradeDeskERP-Setup.exe',
              'sbom.json',
              'updates.json'
            ];

            const missing = expected.filter(n => !names.includes(n));

            let body = `Release **${tag}** asset check:\n\n`;
            body += `Found assets: ${names.length > 0 ? names.join(', ') : '(none)'}\n\n`;
            if (missing.length === 0) {
              body += 'All expected assets are present.';
            } else {
              body += `Missing expected assets: ${missing.join(', ')}\n\n`;
              body += 'Please inspect the release workflow logs.';
            }

            const issueTitle = `Release assets check — ${tag} — ${missing.length === 0 ? 'OK' : 'MISSING'}`;
            await github.rest.issues.create({ owner, repo, title: issueTitle, body });